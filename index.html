<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StudyFlow</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#5bc0de;
padding:20px;
text-align:center;
font-size:40px;
font-weight:bold;
color:white;
}

nav{
background:#ddd;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:8px 15px;
}

.container{
display:flex;
padding:20px;
gap:20px;
}

.left{
width:250px;
}

.right{
flex:1;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.task{
background:#eee;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.progress{
background:#eee;
border-radius:10px;
overflow:hidden;
}

.bar{
height:20px;
background:#5cb85c;
width:0%;
}

</style>

</head>

<body>

<header>
StudyFlow
</header>

<nav>
<button>Tasks</button>
<button>Calendar</button>
<button>Settings</button>
</nav>

<div class="container">

<div class="left">

<div class="card">
<h3>Add Task</h3>

<input id="subject" placeholder="Subject"><br><br>

<input id="desc" placeholder="Task"><br><br>

<input id="date" type="date"><br><br>

<button onclick="addTask()">Add</button>

</div>

<div class="card">

<h3>Complete Task</h3>

<button onclick="completeTask()">Mark selected done</button>

</div>

</div>


<div class="right">

<div class="card">

<h3>Tasks</h3>

<div id="taskList"></div>

</div>


<div class="card">

<h3>Completed tasks</h3>

<div class="progress">
<div id="progressBar" class="bar"></div>
</div>

<p id="progressText">0% completed</p>

</div>

</div>

</div>

<script>

let tasks = []
let selected = null

function addTask(){

let subject = document.getElementById("subject").value
let desc = document.getElementById("desc").value
let date = document.getElementById("date").value

let task = {
subject,
desc,
date,
done:false
}

tasks.push(task)

render()

}

function render(){

let list = document.getElementById("taskList")
list.innerHTML = ""

tasks.forEach((t,i)=>{

let div = document.createElement("div")

div.className = "task"

if(t.done) div.classList.add("completed")

div.innerHTML = `
<b>${t.subject}</b><br>
${t.desc}<br>
${t.date}
`

div.onclick = ()=>{ selected = i }

list.appendChild(div)

})

updateProgress()

}

function completeTask(){

if(selected===null) return

tasks[selected].done = true

render()

}

function updateProgress(){

let done = tasks.filter(t=>t.done).length
let percent = tasks.length ? Math.round(done/tasks.length*100) : 0

document.getElementById("progressBar").style.width = percent + "%"
document.getElementById("progressText").innerText = percent + "% completed"

}

</script>

</body>
</html>
